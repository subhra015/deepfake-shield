project_name: "deepfake-shield"
seed: 42
device: "cuda"

data:
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  test_dir: "data/processed/test"
  image_size: 224
  batch_size: 32
  num_workers: 4
  # If val_dir is missing, set this to split from train.
  val_fraction: 0.0

model:
  backbone: "convnext_tiny"
  num_classes: 2
  dropout: 0.3
  use_attention: true
  pretrained: true

training:
  epochs: 50
  lr: 1e-4
  weight_decay: 1e-2
  label_smoothing: 0.1
  mixed_precision: true
  grad_clip: 1.0
  patience: 10

optimizer:
  name: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5

logging:
  use_wandb: true
  project_name: "deepfake-shield"
  log_interval: 50
