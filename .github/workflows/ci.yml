name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Black check
        run: black --check src tests scripts app

      - name: isort check
        run: isort --check-only src tests scripts app

      - name: mypy
        run: mypy src/

      - name: pytest
        run: pytest tests/ -v --tb=short
        env:
          DEEPFAKE_CHECKPOINT: models/best_model.pth

      - name: Docker build dry-run
        run: docker build -f docker/Dockerfile.api -t deepfake-shield-api:ci .
